name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup TSPack
        uses: yuechen-li-dev/tspack/.github/actions/setup-tspack@v0.1.3
        with:
          version: v0.1.3
      
      - name: Resolve dependencies
        run: tspack update

      - name: Sync dependencies
        run: tspack sync

      - name: Sync dependencies
        run: tspack sync

      - name: Check project
        run: tspack check

      - name: Check formatting
        run: tspack check --format

      - name: Build site
        run: tspack run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
